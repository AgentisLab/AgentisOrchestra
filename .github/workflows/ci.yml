name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: cd app && pnpm install --frozen-lockfile
      - run: cd app && npx tsc --noEmit

  build-bridge:
    name: Build Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: bridge/pnpm-lock.yaml
      - run: cd bridge && pnpm install --frozen-lockfile
      - run: cd bridge && npx tsc --noEmit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build --no-cache app
